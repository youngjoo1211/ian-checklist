<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>이안이 자조기술 체크리스트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1F5F9;--card:#fff;--border:#E2E8F0;
  --text:#0F172A;--sub:#64748B;--muted:#94A3B8;
  --need:#FEE2E2;--need-t:#DC2626;
  --doing:#FEF9C3;--doing-t:#CA8A04;
  --done:#DCFCE7;--done-t:#16A34A;
  --dainy:#FFFBEB;--dainy-b:#F59E0B;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.08);
}
body{font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ─ 헤더 */
.hd{background:#0F172A;color:#fff;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.hd-inner{max-width:900px;margin:0 auto;padding:14px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hd h1{font-size:16px;font-weight:700;flex:1;min-width:180px}
.user-tag{background:#1E293B;border:1px solid #334155;border-radius:20px;padding:4px 12px;font-size:12px;color:#94A3B8}
.user-tag b{color:#fff}
.stats{display:flex;gap:8px}
.stat{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:20px}
.stat-n{background:#FEE2E2;color:#DC2626}
.stat-l{background:#FEF9C3;color:#CA8A04}
.stat-m{background:#DCFCE7;color:#16A34A}
.prog-wrap{width:100%;background:#1E293B;height:4px;border-radius:2px}
.prog-fill{height:4px;background:linear-gradient(90deg,#22C55E,#4ADE80);border-radius:2px;transition:width .4s ease}

/* ─ 툴바 */
.tb{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:57px;z-index:90}
.tb-inner{max-width:900px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:160px;border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:14px;outline:none;transition:border .15s}
.search:focus{border-color:#2563EB}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{border:1.5px solid var(--border);background:#fff;border-radius:20px;padding:4px 11px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.on{color:#fff!important;border-color:transparent}
.lv-chips{display:flex;gap:5px}
.lv-chip{border:1.5px solid var(--border);background:#fff;border-radius:20px;padding:4px 11px;font-size:12px;cursor:pointer;transition:all .15s}
.lv-chip.on-전체{background:#0F172A;color:#fff;border-color:#0F172A}
.lv-chip.on-연습필요{background:var(--need);color:var(--need-t);border-color:var(--need-t);font-weight:600}
.lv-chip.on-연습중{background:var(--doing);color:var(--doing-t);border-color:var(--doing-t);font-weight:600}
.lv-chip.on-숙달됨{background:var(--done);color:var(--done-t);border-color:var(--done-t);font-weight:600}

/* ─ 메인 */
.main{max-width:900px;margin:0 auto;padding:16px 20px 80px}

/* ─ 영역 블록 */
.area{margin-bottom:20px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.area-hd{padding:11px 16px;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.area-hd h2{font-size:14px;font-weight:700;flex:1}
.area-hd .ac{font-size:11px;opacity:.75;display:flex;gap:8px;align-items:center}
.area-hd .mini-prog{width:60px;height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.area-hd .mini-fill{height:3px;background:rgba(255,255,255,.8);border-radius:2px}
.area-hd .caret{font-size:11px;opacity:.7;transition:transform .2s}
.area-hd.collapsed .caret{transform:rotate(-90deg)}
.area-body{background:#fff}

/* ─ 소영역 */
.sub-hd{background:#F8FAFC;padding:5px 16px;font-size:11px;font-weight:600;color:var(--sub);border-bottom:1px solid var(--border);border-top:1px solid var(--border);letter-spacing:.03em;text-transform:uppercase}

/* ─ 항목 */
.item{display:grid;grid-template-columns:32px 1fr auto;gap:8px;align-items:start;padding:10px 12px;border-bottom:1px solid #F8FAFC;transition:background .1s}
.item:hover{background:#FAFBFF}
.item.dainy{background:var(--dainy)}
.item.dainy:hover{background:#FEF3C7}
.item-no{color:var(--muted);font-size:11px;text-align:center;padding-top:1px;font-variant-numeric:tabular-nums}
.item-body{display:flex;flex-direction:column;gap:6px;min-width:0}
.item-text{font-size:13px;line-height:1.5;display:flex;align-items:flex-start;gap:5px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;background:var(--dainy-b);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;margin-top:2px}
.item-inputs{display:flex;gap:5px;flex-wrap:wrap}
.mini-in{border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:11px;color:var(--text);background:#FAFAFA;outline:none;width:140px;transition:border .15s}
.mini-in:focus{border-color:#2563EB;background:#fff}
.mini-in::placeholder{color:var(--muted)}
.mini-in.pre{border-color:#BFDBFE}
.mini-in.post{border-color:#DDD6FE}

/* ─ 수준 버튼 */
.lv-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.lbtn{border:1.5px solid var(--border);background:#F8FAFC;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;transition:all .12s;white-space:nowrap;text-align:center;font-weight:500}
.lbtn:hover{border-color:#94A3B8}
.lbtn.on-연습필요{background:var(--need);border-color:var(--need-t);color:var(--need-t);font-weight:700}
.lbtn.on-연습중{background:var(--doing);border-color:var(--doing-t);color:var(--doing-t);font-weight:700}
.lbtn.on-숙달됨{background:var(--done);border-color:var(--done-t);color:var(--done-t);font-weight:700}

/* ─ 저장 바 */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:10px 20px;display:flex;justify-content:flex-end;gap:8px;z-index:200}
.save-bar-inner{max-width:900px;width:100%;margin:0 auto;display:flex;justify-content:flex-end;gap:8px}
.btn{border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-save{background:#0F172A;color:#fff}
.btn-save:hover{background:#1E293B}
.btn-save.ok{background:#16A34A}
.btn-reset{background:#F1F5F9;color:var(--sub)}
.btn-reset:hover{background:var(--border)}

.empty{text-align:center;padding:60px;color:var(--muted);font-size:15px}

@media(max-width:580px){
  .item{grid-template-columns:24px 1fr}
  .lv-btns{grid-column:2;flex-direction:row;flex-wrap:wrap}
  .mini-in{width:120px}
  .stats{display:none}
}
</style>
</head>
<body>

<!-- Netlify Forms 감지용 hidden form -->
<form name="checklist-save" data-netlify="true" hidden>
  <input name="user"><input name="saved_at">
  <input name="숙달됨수"><input name="연습중수"><input name="연습필요수">
  <input name="전체데이터">
</form>

<div class="hd">
  <div class="hd-inner">
    <h1>이안이 자조기술 체크리스트</h1>
    <div class="user-tag">기록자: <b id="user-label">로딩중…</b></div>
    <div class="stats">
      <div class="stat stat-n">연습필요 <b id="sn">0</b></div>
      <div class="stat stat-l">연습중 <b id="sl">0</b></div>
      <div class="stat stat-m">숙달됨 <b id="sm">0</b></div>
    </div>
    <div style="width:100%">
      <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div class="tb">
  <div class="tb-inner">
    <input class="search" id="search" placeholder="🔍 항목 검색…" oninput="render()">
    <div class="chips" id="area-chips"></div>
    <div class="lv-chips" id="lv-chips">
      <button class="lv-chip on-전체" onclick="setLvFilter('전체')">전체</button>
      <button class="lv-chip" onclick="setLvFilter('연습필요')">연습필요</button>
      <button class="lv-chip" onclick="setLvFilter('연습중')">연습중</button>
      <button class="lv-chip" onclick="setLvFilter('숙달됨')">숙달됨</button>
      <button class="lv-chip" onclick="setLvFilter('미설정')">미설정</button>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<div class="save-bar">
  <div class="save-bar-inner">
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
    <button class="btn btn-save" id="savebtn" onclick="saveAll()">💾 저장하기</button>
  </div>
</div>

const AC = {"신변처리·위생": "#2563EB", "등하교 준비": "#16A34A", "교실 기본 생활": "#7C3AED", "학습·필기 도구 사용": "#B45309", "급식·점심": "#CA8A04", "쉬는 시간 활동": "#059669", "수업 전환·이동": "#DC2626", "체육·야외 활동": "#0891B2", "의사소통·사회적 기술": "#9333EA", "자기 조절·정서 관리": "#DB2777", "경계선": "#E11D48", "보조인과의 협력": "#2563EB", "시간·일과 관리": "#4D7C0F"};
const AREAS = [...new Set(ITEMS.map(d=>d.a))];

// URL에서 사용자 이름 읽기
const params = new URLSearchParams(location.search);
const USER = params.get('user') || '영주';
document.getElementById('user-label').textContent = USER;

// 로컬 상태 (localStorage 사용 — 실제 배포 환경에서 작동)
const STORE_KEY = `ian-checklist-${USER}`;
let state = {};
try { state = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) {}

let activeArea = '전체', activeLv = '전체';

// ─ 영역 칩 생성
function buildAreaChips() {
  const el = document.getElementById('area-chips');
  el.innerHTML = ['전체',...AREAS].map(a => {
    const col = AC[a]||'#555';
    const on = activeArea === a;
    return `<button class="chip${on?' on':''}" style="${on?`background:${col};border-color:${col}`:''}"
      onclick="setAreaFilter('${a}')">${a==='전체'?'전체':a}</button>`;
  }).join('');
}
function setAreaFilter(a){activeArea=a;buildAreaChips();render()}
function setLvFilter(l){
  activeLv=l;
  document.querySelectorAll('.lv-chip').forEach(b=>{
    const label=b.textContent.trim();
    b.className='lv-chip'+(label===l?` on-${l}`:'');
  });
  render();
}

// ─ 렌더
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let items = ITEMS;
  if(activeArea!=='전체') items=items.filter(d=>d.a===activeArea);
  if(q) items=items.filter(d=>d.t.toLowerCase().includes(q)||d.s.toLowerCase().includes(q));
  if(activeLv!=='전체') {
    items=items.filter(d=>{
      const lv=(state[d.i]||{}).level||'';
      return activeLv==='미설정'?!lv:lv===activeLv;
    });
  }

  // 통계
  const total=ITEMS.length;
  const nm=ITEMS.filter(d=>(state[d.i]||{}).level==='연습필요').length;
  const nl=ITEMS.filter(d=>(state[d.i]||{}).level==='연습중').length;
  const nd=ITEMS.filter(d=>(state[d.i]||{}).level==='숙달됨').length;
  document.getElementById('sn').textContent=nm;
  document.getElementById('sl').textContent=nl;
  document.getElementById('sm').textContent=nd;
  document.getElementById('prog').style.width=(nd/total*100).toFixed(1)+'%';

  if(!items.length){document.getElementById('main').innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return}

  // 그룹
  const byArea={};
  items.forEach(d=>{
    if(!byArea[d.a])byArea[d.a]={};
    if(!byArea[d.a][d.s])byArea[d.a][d.s]=[];
    byArea[d.a][d.s].push(d);
  });

  let html='';
  for(const[area,subs] of Object.entries(byArea)){
    const col=AC[area]||'#555';
    const allInArea=Object.values(subs).flat();
    const tot=allInArea.length;
    const done=allInArea.filter(d=>(state[d.i]||{}).level==='숙달됨').length;
    const pct=tot?Math.round(done/tot*100):0;
    html+=`<div class="area" id="area-${area}">
      <div class="area-hd" style="background:${col}" onclick="toggleArea(this)">
        <h2>${area}</h2>
        <div class="ac">
          <span>숙달 ${done}/${tot}</span>
          <div class="mini-prog"><div class="mini-fill" style="width:${pct}%"></div></div>
          <span class="caret">▾</span>
        </div>
      </div>
      <div class="area-body">`;
    for(const[sub,rows] of Object.entries(subs)){
      html+=`<div class="sub-hd">${sub}</div>`;
      rows.forEach(d=>{
        const st=state[d.i]||{};
        const lv=st.level||'';
        const pre=(st.pre||'').replace(/"/g,'&quot;');
        const post=(st.post||'').replace(/"/g,'&quot;');
        const note=(st.note||'').replace(/"/g,'&quot;');
        html+=`<div class="item${d.d?' dainy':''}">
          <div class="item-no">${d.i}</div>
          <div class="item-body">
            <div class="item-text">
              <span>${d.t}</span>
              ${d.d?'<span class="badge">다인이</span>':''}
            </div>
            <div class="item-inputs">
              <input class="mini-in pre" placeholder="선행 기술" value="${pre}"
                onchange="updateMeta(${d.i},'pre',this.value)">
              <input class="mini-in post" placeholder="파생 기술" value="${post}"
                onchange="updateMeta(${d.i},'post',this.value)">
              <input class="mini-in" placeholder="메모" value="${note}"
                onchange="updateMeta(${d.i},'note',this.value)">
            </div>
          </div>
          <div class="lv-btns">
            <button class="lbtn${lv==='연습필요'?' on-연습필요':''}" onclick="setLevel(${d.i},'연습필요')">연습필요</button>
            <button class="lbtn${lv==='연습중'?' on-연습중':''}" onclick="setLevel(${d.i},'연습중')">연습 중</button>
            <button class="lbtn${lv==='숙달됨'?' on-숙달됨':''}" onclick="setLevel(${d.i},'숙달됨')">숙달됨</button>
          </div>
        </div>`;
      });
    }
    html+=`</div></div>`;
  }
  document.getElementById('main').innerHTML=html;
}

function toggleArea(hd){
  const body=hd.nextElementSibling;
  const hide=body.style.display!=='none';
  body.style.display=hide?'none':'';
  hd.classList.toggle('collapsed',hide);
}
function setLevel(id,lv){
  if(!state[id])state[id]={};
  state[id].level=state[id].level===lv?'':lv;
  markDirty();render();
}
function updateMeta(id,key,val){
  if(!state[id])state[id]={};
  state[id][key]=val;
  markDirty();
}

let dirty=false;
function markDirty(){dirty=true;const b=document.getElementById('savebtn');b.className='btn btn-save';b.textContent='💾 저장하기';}

async function saveAll(){
  // 1. localStorage 저장
  try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}

  // 2. Netlify Forms 전송
  const nm=ITEMS.filter(d=>(state[d.i]||{}).level==='연습필요').length;
  const nl=ITEMS.filter(d=>(state[d.i]||{}).level==='연습중').length;
  const nd=ITEMS.filter(d=>(state[d.i]||{}).level==='숙달됨').length;

  const body=new URLSearchParams();
  body.append('form-name','checklist-save');
  body.append('user',USER);
  body.append('saved_at',new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'}));
  body.append('숙달됨수',nd);
  body.append('연습중수',nl);
  body.append('연습필요수',nm);
  body.append('전체데이터',JSON.stringify(state));

  try{
    await fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
  }catch(e){}

  const btn=document.getElementById('savebtn');
  btn.className='btn btn-save ok';
  btn.textContent='✓ 저장 완료';
  dirty=false;
  setTimeout(()=>{btn.className='btn btn-save';btn.textContent='💾 저장하기';},2500);
}

function resetAll(){
  if(!confirm('내 기록을 모두 초기화할까요?'))return;
  state={};
  try{localStorage.removeItem(STORE_KEY);}catch(e){}
  markDirty();render();
}

buildAreaChips();render();
</script>
</body>
</html>
